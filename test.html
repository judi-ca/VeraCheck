<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Plateforme</title>

<!-- 🔗 Lien vers le fichier CSS -->

<style>

  body {
  margin: 0;
  font-family: Arial;

  /* ⚠️ Tu peux changer la couleur principale */
  background: #0f172a;
  color: white;
}

/* 🟢 CONTAINER DES CARDS */
.cards {
  display: flex;
  gap: 20px;
}

/* 🃏 CARD */
.card {
  width: 250px;

  /* ⚠️ Change la couleur ici pour le style */
  background: rgba(255,255,255,0.05);

  padding: 15px;
  border-radius: 16px;
}

/* 🔘 BOUTON */
.btn {
  background: #34d399;

  /* ⚠️ Change couleur du bouton */
  border: none;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
}

/* 🔵 PAGE COURS (cachée au début) */
#coursePage {
  display: none;
  padding: 20px;
}

/* 🔙 BOUTON RETOUR */
.back {
  margin-bottom: 20px;
  cursor: pointer;

  /* ⚠️ Change le style du bouton retour */
  background: #34d399;
  padding: 8px 12px;
  border-radius: 20px;
  color: black;
}

/* ❓ QUESTION */
.question {
  background: rgba(255,255,255,0.08);

  /* ⚠️ Tu peux modifier le style des questions */
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
}



</style>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🟢 LANDING PAGE -->
<div id="landing">
  <h1>📚 Catalogue</h1>

  <div class="cards">

    <!-- 🃏 CARD 1 -->
    <div class="card">
      <h3>Détecter les images manipulées</h3>
      <p>Apprends à analyser les images</p>

      <!-- ⚠️ Ici tu changes l’ID du cours -->
      <button class="btn" onclick="openCourse('images')">Voir</button>
    </div>

    <!-- 🃏 CARD 2 -->
    <div class="card">
      <h3>Fact-checking</h3>
      <p>Vérifier les informations</p>

      <!-- ⚠️ Tu peux changer "fact" -->
      <button class="btn" onclick="openCourse('fact')">Voir</button>
    </div>

  </div>
</div>

<!-- 🔵 PAGE COURS -->
<div id="coursePage">
  <div class="back" onclick="goBack()">⬅ Retour</div>

  <!-- ⚠️ Ici le contenu sera injecté par JavaScript -->
  <div id="courseContent"></div>
</div>

<!-- 🔗 Lien vers le JS -->
<script>

    
// 📦 BASE DE DONNÉES DES COURS
const courses = {

  images: {
    title: "Détection des images manipulées",

    // ⚠️ Tu peux ajouter / modifier les conseils ici
    conseils: [
      "Regarde les ombres",
      "Analyse les incohérences",
      "Utilise la recherche inversée"
    ],

    // ⚠️ Tu peux ajouter des questions
    questions: [
      "Comment reconnaître une image fake ?",
      "Pourquoi manipuler une image ?"
    ]
  },

  fact: {
    title: "Introduction au fact-checking",

    conseils: [
      "Vérifie la source",
      "Compare plusieurs sites"
    ],

    questions: [
      "Qu’est-ce qu’une fake news ?",
      "Pourquoi vérifier ?"
    ]
  }
};



// 🚀 OUVRIR UN COURS
function openCourse(id) {

  // 🔴 cache la page d’accueil
  document.getElementById("landing").style.display = "none";

  // 🔵 affiche la page du cours
  document.getElementById("coursePage").style.display = "block";

  // 📦 récupérer le cours selon l’ID
  const course = courses[id];

  const container = document.getElementById("courseContent");

  // ⚠️ Tu peux modifier le format HTML ici
  container.innerHTML = `
    <h1>${course.title}</h1>

    <h3>📌 Conseils</h3>
    <ul>
      ${course.conseils.map(c => `<li>${c}</li>`).join("")}
    </ul>

    <h3>❓ Questions</h3>
    ${course.questions.map(q => `<div class="question">${q}</div>`).join("")}
  `;
}



// 🔙 RETOUR À LA PAGE D’ACCUEIL
function goBack() {

  // 🔵 affiche landing
  document.getElementById("landing").style.display = "block";

  // 🔴 cache cours
  document.getElementById("coursePage").style.display = "none";
}

</script>

</body>
</html>
